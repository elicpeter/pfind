<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 380" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" font-size="12">
<defs>
  <style>
    .bg   {fill:#fbfbf8;}
    .frame{fill:none; stroke:#d8d8d3; stroke-width:1;}
    .ttl {fill:#111; font-size:14px; font-weight:600;}
    .sub {fill:#666; font-size:11px;}
    .row {fill:#222; font-size:12px;}
    .pct {fill:#222; font-size:12px; font-variant-numeric: tabular-nums;}
    .des {fill:#666; font-size:11px;}
    .seg-edge {stroke:#fff; stroke-width:1.5;}
  </style>
</defs>
<rect class="bg" x="0" y="0" width="820" height="380"/>
<rect class="frame" x="0.5" y="0.5" width="819" height="379"/>
<text class="ttl" x="410.0" y="22" text-anchor="middle">Where pfind spends its time, leaf samples</text>
<text class="sub" x="410.0" y="40" text-anchor="middle">samply at 4 kHz, 30 iterations, 100,000 file tree, default settings</text>
